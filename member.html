<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celeste Collection</title>

  <link rel="stylesheet" href="css/member.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">


  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
      <!-- TOP BAR -->
  <div class="top-bar">
    <p>全館滿 NT$1,500 免運費</p>
    <span>|</span>
    <p>加入會員享 5% 回饋</p>
  </div>
          <!-- NAVBAR -->
  <header class="navbar">

    <div class="logo">
      <h1>Celeste</h1>
      <span>COLLECTION</span>
    </div>

    <nav>
      <a href="index.html">首頁</a>
      <a href="category.html">唱片分類</a>
      <a href="new-arrival.html">新品上架</a>
      <a href="classic.html">經典推薦</a>
      <a href="vinyl-knowledge.html">黑膠知識</a>
      <a href="about-us.html">關於我們</a>
    </nav>

    <div class="nav-icons">
      <i class="fa-solid fa-magnifying-glass"></i>
      <i class="fa-regular fa-user"></i>

      <div class="icon-badge">
        <i class="fa-regular fa-heart"></i>
        <span>12</span>
      </div>

      <div class="icon-badge">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>3</span>
      </div>
    </div>
  </header>


        <section class="hero-section member-section">
            <div class="bg-decoration-circle bg-circle-1"></div>
            <div class="bg-decoration-circle bg-circle-2"></div>
            <div class="bg-decoration-circle bg-circle-3"></div>
            <div class="deco-element deco-line"></div>
            <div class="deco-element deco-line"></div>
            <div class="deco-element deco-line"></div>
            <div class="deco-element deco-line"></div>
            <div class="deco-label top-left">MEMBERSHIP</div>
            <div class="deco-label bottom-right">JOIN US</div>
            <div class="artistic-typography">
                <div class="big-text t-member">MEMBER</div>
                <div class="big-text t-area">AREA</div>
            </div>
            <div class="member-content-wrapper">
                <div class="member-visual">
                    <img src="img/GSW690II.png" alt="Classic Camera" class="floating-camera">
                    <div class="visual-text">
                        <h3>Welcome Back</h3>
                        <p>讓黑膠，<br />成為你的日常。</p>
                    </div>
                </div>
                <div class="member-form-card">
                    <div class="member-tabs">
                        <button class="tab-btn active" data-tab="account">會員帳號</button>
                        <button class="tab-btn" data-tab="favorites">我的收藏</button>
                        <button class="tab-btn" data-tab="reviews">我的評價</button>
                    </div>

                    <div id="tab-account" class="tab-content active">
                        <h2 class="form-title" id="pageTitle">會員登入</h2>
                        
                        <div class="form-container" id="loggedInView" style="display: none;">
                            <div class="profile-header">
                                <div class="profile-avatar">
                                    <i class="fa fa-user"></i>
                                </div>
                                <div class="profile-info">
                                    <h3 id="profileName">User Name</h3>
                                    <p id="profileEmail">user@example.com</p>
                                </div>
                            </div>
                            <div class="profile-stats">
                                <div class="stat-item">
                                    <div class="stat-value" id="orderCountDisplay">0</div>
                                    <div class="stat-label">訂單</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value" id="favCountDisplay">0</div>
                                    <div class="stat-label">收藏</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value" id="couponCountDisplay">0</div>
                                    <div class="stat-label">優惠券</div>
                                </div>
                            </div>
                            <div class="profile-actions">
                                <button class="btn btn-secondary btn-block" onclick="showEditProfile()"><i class="fa fa-edit"></i> 編輯個人資料</button>
                                <button class="btn btn-secondary btn-block" onclick="showOrderHistory()"><i class="fa fa-list-alt"></i> 查看歷史訂單</button>
                                <button class="btn btn-primary btn-block" onclick="logout()"><i class="fa fa-sign-out"></i> 登出</button>
                            </div>
                        </div>
                        <div class="form-container" id="editProfileView" style="display: none;">
                            <h3 class="form-title" style="font-size: 1.5rem; margin-bottom: 20px;">編輯個人資料</h3>
                            <form id="editProfileForm" onsubmit="saveProfile(event)">
                                <div class="form-group">
                                    <label class="form-label">姓名</label>
                                    <input type="text" id="editName" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">新密碼 (若不修改請留空)</label>
                                    <input type="password" id="editPassword" class="form-input" placeholder="••••••••">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">確認新密碼</label>
                                    <input type="password" id="editConfirmPassword" class="form-input" placeholder="••••••••">
                                </div>
                                <div style="display: flex; gap: 10px; margin-top: 20px;">
                                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="cancelEditProfile()">取消</button>
                                    <button type="submit" class="btn btn-primary" style="flex: 1;">儲存變更</button>
                                </div>
                            </form>
                        </div>

                        <div class="form-container" id="orderHistoryView" style="display: none;">
                            <div style="display: flex; align-items: center; margin-bottom: 20px;">
                                <button class="btn-icon" onclick="closeOrderHistory()" style="margin-right: 10px;"><i class="fa fa-arrow-left"></i></button>
                                <h3 class="form-title" style="font-size: 1.5rem; margin-bottom: 0;">歷史訂單</h3>
                            </div>
                            <div id="orderListContainer" style="max-height: 400px; overflow-y: auto;">
                            </div>
                        </div>

                        <div class="form-container" id="loginFormContainer">
                            <form id="loginForm">
                                <div class="form-group">
                                    <label class="form-label">電子郵件</label>
                                    <input type="email" id="loginEmail" class="form-input" placeholder="name@example.com" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">密碼</label>
                                    <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">登入</button>
                            </form>
                            <div class="form-footer">
                                <p>還沒有帳號嗎？ <a href="#" id="showRegisterBtn">註冊新帳號</a></p>
                            </div>
                        </div>
                        <div class="form-container" id="registerFormContainer" style="display: none;">
                            <form id="registerForm">
                                <div class="form-group">
                                    <label class="form-label">姓名</label>
                                    <input type="text" id="regName" class="form-input" placeholder="Your Name" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">電子郵件</label>
                                    <input type="email" id="regEmail" class="form-input" placeholder="name@example.com" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">密碼</label>
                                    <input type="password" id="regPassword" class="form-input" placeholder="••••••••" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">確認密碼</label>
                                    <input type="password" id="regConfirmPassword" class="form-input" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">註冊</button>
                            </form>
                            <div class="form-footer">
                                <p>已經有帳號了嗎？ <a href="#" id="showLoginBtn" style="color: #333; text-decoration: underline; font-weight: bold; cursor: pointer; position: relative; z-index: 100;">返回登入</a></p>
                            </div>
                        </div>
                    </div>

                    <div id="tab-favorites" class="tab-content">
                        <h2 class="form-title">我的收藏</h2>
                        <div id="favoritesList" class="favorites-list-integrated">
                            
                            <div class="empty-state">
                                <p>尚未收藏任何商品</p>
                                <a href="shop.html" class="btn-link">去逛逛</a>
                            </div>
                        </div>
                    </div>

                    <div id="tab-reviews" class="tab-content">
                        <h2 class="form-title">我的評價紀錄</h2>
                        <div class="reviews-list-container" style="max-height: 400px; overflow-y: auto;">
                            <!-- Reviews will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
            
            

        </section>
        <div class="fab-cart" onclick="window.location.href='checkout.html'">
            <img src="img/cart.png" alt="Cart">
            <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '1';
            }, 100);
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');

                    if (!href || href === '#') return;
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = href;
                    }, 500);
                });
            });
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cartBadge');
            if (cart.length > 0) {
                badge.textContent = cart.length;
                badge.style.display = 'flex';
            }
            
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));

                    btn.classList.add('active');
                    const tabId = btn.dataset.tab;
                    document.getElementById(`tab-${tabId}`).classList.add('active');

                    if (tabId === 'reviews') {
                        if (typeof window.renderReviewsList === 'function') {
                            window.renderReviewsList();
                        }
                    }
                });
            });

            window.renderReviewsList = function() {
                const container = document.querySelector('.reviews-list-container');
                if (!container) return;
                
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                
                if (!currentUser) {
                    container.innerHTML = '<div class="empty-state" style="display:block"><p>請先登入以查看評價紀錄</p></div>';
                    return;
                }

                const allReviews = JSON.parse(localStorage.getItem('review_history')) || [];
                
                const userReviews = allReviews.filter(r => r.userEmail === currentUser.email).reverse();

                if (userReviews.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="display:block">
                            <p>尚未發表任何評價</p>
                            <a href="shop.html" class="btn-link">去逛逛</a>
                        </div>`;
                    return;
                }

                let html = '';
                userReviews.forEach(review => {
                    const stars = "★".repeat(review.stars) + "☆".repeat(5 - review.stars);
                    html += `
                        <div class="review-item" style="border-bottom: 1px solid #eee; padding: 15px 0;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span style="font-weight: bold; color: #333;">${review.productName}</span>
                                <span style="color: #888; font-size: 0.8rem;">${review.date}</span>
                            </div>
                            <div style="color: #ffc107; margin-bottom: 8px; letter-spacing: 2px;">${stars}</div>
                            <p style="color: #555; font-size: 0.9rem; line-height: 1.5;">${review.text}</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            };

            window.renderFavoritesList = function(containerId) {
                const container = document.getElementById(containerId);
                if (!container) return;

                const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                if (favorites.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>尚未收藏任何商品</p>
                            <a href="shop.html" class="btn-link">去逛逛</a>
                        </div>`;
                    return;
                }

                let html = '';
                favorites.forEach(item => {
                    html += `
                        <div class="fav-item-row">
                            <img src="${item.image}" alt="${item.name}" class="fav-item-img">
                            <div class="fav-item-info">
                                <div class="fav-item-name">${item.name}</div>
                                <div class="fav-item-price">${item.price}</div>
                            </div>
                            <div class="fav-item-actions">
                                <button class="btn-icon" onclick="window.location.href='shop.html'" title="購買">
                                    <i class="fa fa-shopping-cart"></i>
                                </button>
                                <button class="btn-icon" onclick="removeFavorite('${item.id}'); renderFavoritesList('${containerId}')" title="移除">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            };

            window.removeFavorite = function(id) {
                const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                const index = favorites.findIndex(item => item.id === id);
                if (index !== -1) {
                    favorites.splice(index, 1);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                }
            };

            renderFavoritesList('favoritesList');

            const loginContainer = document.getElementById('loginFormContainer');
            const registerContainer = document.getElementById('registerFormContainer');
            const pageTitle = document.getElementById('pageTitle');
            const showRegisterBtn = document.getElementById('showRegisterBtn');
            const showLoginBtn = document.getElementById('showLoginBtn');
            showRegisterBtn.addEventListener('click', (e) => {
                e.preventDefault();
                loginContainer.style.display = 'none';
                registerContainer.style.display = 'block';
                pageTitle.textContent = '註冊新帳號';
            });
            showLoginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                registerContainer.style.display = 'none';
                loginContainer.style.display = 'block';
                pageTitle.textContent = '會員登入';
            });

            const registerForm = document.getElementById('registerForm');
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                const confirmPassword = document.getElementById('regConfirmPassword').value;
                if (password !== confirmPassword) {
                    showNotification('兩次密碼輸入不一致！', 'error');
                    return;
                }

                const users = JSON.parse(localStorage.getItem('users')) || [];
                if (users.find(u => u.email === email)) {
                    showNotification('該 Email 已經註冊過了！', 'error');
                    return;
                }

                users.push({ name, email, password });
                localStorage.setItem('users', JSON.stringify(users));
                showNotification('註冊成功！請登入。', 'success');
                showLoginBtn.click();
            });

            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === email && u.password === password);
                if (user) {
                    if (typeof window.triggerDoorAnimation === 'function') {
                        window.triggerDoorAnimation('WELCOME', () => {
                            localStorage.setItem('currentUser', JSON.stringify(user));
                            window.checkLoginStatus();
                            showNotification('登入成功！歡迎回來，' + user.name, 'success');
                        });
                    } else {
                        localStorage.setItem('currentUser', JSON.stringify(user));
                        showNotification('登入成功！歡迎回來，' + user.name, 'success');
                        window.checkLoginStatus();
                    }
                } else {
                    showNotification('帳號或密碼錯誤！', 'error');
                }
            });



            window.showEditProfile = function() {
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                if (!currentUser) return;

                document.getElementById('loggedInView').style.display = 'none';
                document.getElementById('editProfileView').style.display = 'block';
                
                document.getElementById('editName').value = currentUser.name;
                document.getElementById('editPassword').value = '';
                document.getElementById('editConfirmPassword').value = '';
            };

            window.cancelEditProfile = function() {
                document.getElementById('editProfileView').style.display = 'none';
                document.getElementById('loggedInView').style.display = 'block';
            };

            window.saveProfile = function(e) {
                e.preventDefault();
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                const users = JSON.parse(localStorage.getItem('users')) || [];
                
                const newName = document.getElementById('editName').value;
                const newPassword = document.getElementById('editPassword').value;
                const confirmPassword = document.getElementById('editConfirmPassword').value;

                if (newPassword && newPassword !== confirmPassword) {
                    showNotification('新密碼輸入不一致！', 'error');
                    return;
                }

                currentUser.name = newName;
                if (newPassword) {
                    currentUser.password = newPassword;
                }

                const userIndex = users.findIndex(u => u.email === currentUser.email);
                if (userIndex !== -1) {
                    users[userIndex] = currentUser;
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showNotification('個人資料已更新！', 'success');
                    cancelEditProfile();
                    window.checkLoginStatus();
                } else {
                    showNotification('更新失敗，找不到使用者資料。', 'error');
                }
            };

            window.showOrderHistory = function() {
                document.getElementById('loggedInView').style.display = 'none';
                document.getElementById('orderHistoryView').style.display = 'block';
                renderOrderHistory();
            };

            window.closeOrderHistory = function() {
                document.getElementById('orderHistoryView').style.display = 'none';
                document.getElementById('loggedInView').style.display = 'block';
            };

            window.renderOrderHistory = function() {
                const container = document.getElementById('orderListContainer');
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                const orders = JSON.parse(localStorage.getItem('orders')) || [];
                
                const userOrders = orders.filter(o => o.userEmail === currentUser.email).reverse();

                if (userOrders.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">尚無歷史訂單</p>';
                    return;
                }

                let html = '';
                userOrders.forEach(order => {
                    let itemsHtml = '';
                    order.items.forEach(item => {
                        itemsHtml += `<div style="font-size: 0.9rem; color: #666; margin-bottom: 5px;">${item.name} x 1</div>`;
                    });

                    html += `
                        <div style="border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fafafa;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                                <span style="font-weight: bold; color: #333;">${order.date.split(' ')[0]}</span>
                                <span style="color: #d32f2f; font-weight: bold;">NT$ ${order.total.toLocaleString()}</span>
                            </div>
                            <div style="margin-bottom: 10px;">
                                ${itemsHtml}
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;">
                                <span style="background: #e0e0e0; padding: 2px 8px; border-radius: 4px; color: #555;">${order.status}</span>
                                <span style="color: #999;">訂單編號: ${order.id.slice(-6)}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            };

            window.checkLoginStatus = function() {
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                const loginContainer = document.getElementById('loginFormContainer');
                const registerContainer = document.getElementById('registerFormContainer');
                const loggedInView = document.getElementById('loggedInView');
                const editProfileView = document.getElementById('editProfileView');
                const orderHistoryView = document.getElementById('orderHistoryView');
                const pageTitle = document.getElementById('pageTitle');
                const favCountDisplay = document.getElementById('favCountDisplay');
                const orderCountDisplay = document.getElementById('orderCountDisplay');
                const couponCountDisplay = document.getElementById('couponCountDisplay');

                if (currentUser) {
                    loginContainer.style.display = 'none';
                    registerContainer.style.display = 'none';
                    editProfileView.style.display = 'none';
                    orderHistoryView.style.display = 'none';
                    loggedInView.style.display = 'block';
                    
                    pageTitle.textContent = '會員中心';
                    document.getElementById('profileName').textContent = currentUser.name;
                    document.getElementById('profileEmail').textContent = currentUser.email;
                    
                    const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                    if(favCountDisplay) favCountDisplay.textContent = favorites.length;
                    
                    const orders = JSON.parse(localStorage.getItem('orders')) || [];
                    const userOrders = orders.filter(o => o.userEmail === currentUser.email);
                    if(orderCountDisplay) orderCountDisplay.textContent = userOrders.length;

                    const coupons = JSON.parse(localStorage.getItem('coupons')) || [];
                    if(couponCountDisplay) couponCountDisplay.textContent = coupons.length;

                } else {
                    loggedInView.style.display = 'none';
                    editProfileView.style.display = 'none';
                    orderHistoryView.style.display = 'none';
                    loginContainer.style.display = 'block';
                    registerContainer.style.display = 'none';
                    pageTitle.textContent = '會員登入';
                }
            }

            window.checkLoginStatus();
        });
    </script>
    <script src="js/notification.js"></script>
    <script src="js/member.js"></script>
<script src="js/cart.js"></script>
<script src="js/favorites.js"></script>
</body>
</html>
